<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Play Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-gray-100 min-h-screen p-4">

    <div id="popup-backdrop" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-slate-900 border border-cyan-500 rounded-2xl w-full max-w-xs p-6 text-center">
            <h3 class="text-xl font-black text-white">Pesanan Terkirim!</h3>
            <button onclick="location.reload()" class="mt-6 w-full bg-cyan-600 py-2 rounded-xl font-bold text-white">OKE</button>
        </div>
    </div>

    <div id="hal-operator" class="max-w-4xl mx-auto hidden">
        <h2 class="text-2xl font-black text-cyan-400 mb-4">Monitor Kasir</h2>
        <div id="list-pesanan" class="space-y-3"></div>
    </div>

    <div id="hal-konsumen" class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-center text-cyan-400 mb-6">COSMO PLAY STATION</h1>
        <div id="wadah-menu-list" class="space-y-3"></div>
        <div class="mt-4 p-4 bg-slate-900 rounded-xl border border-cyan-500 text-center">
            <div class="text-sm text-gray-400">Total Harga:</div>
            <div id="total-harga" class="text-2xl font-black text-cyan-400">Rp 0</div>
        </div>
        <button onclick="kirimPesanan()" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-xl font-black uppercase text-white shadow-lg">
            Kirim Pesanan
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAklu0gWnJQutvrGIPX-Hlaa90zS98nY38",
            authDomain: "cosmos-b240a.firebaseapp.com",
            projectId: "cosmos-b240a",
            storageBucket: "cosmos-b240a.firebasestorage.app",
            messagingSenderId: "447497705248",
            appId: "1:447497705248:web:6ff442c5e0fc232b26a945"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // FUNGSI SELESAI
        window.tandaiSelesai = async (id) => {
            await updateDoc(doc(db, "pesanan", id), { status: "selesai" });
        };

        const menuData = [
            { nama: "Tea Jus", harga: 2000 }, { nama: "Marimas", harga: 2000 },
            { nama: "Es Teh", harga: 3000 }, { nama: "Nutrisari", harga: 4000 },
            { nama: "White Coffe", harga: 4000 }, { nama: "Cappucino", harga: 5000 },
            { nama: "Snack - Snack", harga: 3000 }, { nama: "Indomie Goreng", harga: 6000 },
            { nama: "Indomie Goreng Telur", harga: 9000 }, { nama: "Paket 1 PS3", harga: 15000 },
            { nama: "Paket Ramai PS4", harga: 30000 }
        ];

        let keranjang = {};
        const container = document.getElementById('wadah-menu-list');
        const params = new URLSearchParams(window.location.search);

        if (params.get('mode') === 'operator') {
            document.getElementById('hal-operator').classList.remove('hidden');
            document.getElementById('hal-konsumen').classList.add('hidden');
            const q = query(collection(db, "pesanan"), where("status", "==", "baru"), orderBy("waktuServer", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('list-pesanan');
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="bg-slate-900 p-4 rounded-xl border border-blue-500">
                        <div class="flex justify-between text-xs text-blue-400"><span>Jam: ${d.jam}</span><span class="font-bold">Total: Rp ${d.total.toLocaleString()}</span></div>
                        <div class="font-bold mt-1 text-sm">${JSON.stringify(d.pesanan).replace(/["{}]/g, '').replace(/:/g, ' x ').replace(/,/g, ', ')}</div>
                        <button onclick="tandaiSelesai('${doc.id}')" class="mt-3 w-full bg-green-600 py-1 rounded text-xs font-bold uppercase">Selesai</button>
                    </div>`;
                });
            });
        } else {
            menuData.forEach(item => {
                keranjang[item.nama] = { qty: 0, harga: item.harga };
                container.innerHTML += `
                <div class="bg-slate-900 p-4 rounded-xl border border-blue-900 flex justify-between items-center">
                    <div><div class="font-bold">${item.nama}</div><div class="text-xs text-blue-400">Rp ${item.harga.toLocaleString()}</div></div>
                    <div class="flex items-center gap-3">
                        <button onclick="ubah('${item.nama}', -1)" class="bg-slate-800 w-8 h-8 rounded-lg font-bold">-</button>
                        <span id="qty-${item.nama.replace(/\s+/g, '-')}" class="w-6 text-center font-bold">0</span>
                        <button onclick="ubah('${item.nama}', 1)" class="bg-slate-800 w-8 h-8 rounded-lg font-bold">+</button>
                    </div>
                </div>`;
            });
        }

        window.ubah = (nama, delta) => {
            keranjang[nama].qty = Math.max(0, keranjang[nama].qty + delta);
            document.getElementById(`qty-${nama.replace(/\s+/g, '-')}`).innerText = keranjang[nama].qty;
            let total = 0;
            Object.values(keranjang).forEach(i => total += (i.qty * i.harga));
            document.getElementById('total-harga').innerText = "Rp " + total.toLocaleString();
        };

        window.kirimPesanan = async () => {
            const p = {};
            let total = 0;
            Object.keys(keranjang).forEach(k => {
                if(keranjang[k].qty > 0) {
                    p[k] = keranjang[k].qty;
                    total += (keranjang[k].qty * keranjang[k].harga);
                }
            });
            if (total === 0) return alert("Pilih menu dulu!");
            await addDoc(collection(db, "pesanan"), { pesanan: p, total: total, jam: new Date().toLocaleTimeString('id-ID'), status: "baru", waktuServer: serverTimestamp() });
            document.getElementById('popup-backdrop').classList.remove('hidden');
        };
    </script>
</body>
</html>
